<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>NØ&Co | Check Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .serif-font{font-family:'Playfair Display',serif}
        body{font-family:'Inter',sans-serif; background-color: #f8f8f8;}

        /* --- ADVANCED ANIMATIONS --- */
        @keyframes revealUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            30% { transform: translate(3%, -15%); }
            50% { transform: translate(12%, 9%); }
            70% { transform: translate(-10%, 10%); }
            90% { transform: translate(15%, 5%); }
        }

        .animate-reveal { animation: revealUp 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        .floating-icon { animation: float 4s ease-in-out infinite; }

        /* Grainy Overlay for high-end feel */
        .grain-bg::before {
            content: "";
            position: absolute;
            top: -200%; left: -200%; width: 400%; height: 400%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.04;
            pointer-events: none;
            animation: grain 8s steps(10) infinite;
        }

        /* --- TOAST STYLING --- */
        #toast-container {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .custom-pill-toast {
            width: max-content;
            padding: 10px 22px 10px 14px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #000;
            color: #fff;
        }

        .custom-pill-toast.show { opacity: 1; transform: translateY(0); }
        .toast-icon-circle { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .toast-success .toast-icon-circle { background: #2F8D46; }
        .toast-error .toast-icon-circle { background: #E03B2A; }
        .toast-main-text { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 overflow-hidden grain-bg">

<div id="toast-container"></div>

<main class="w-full max-w-[500px] text-center z-10">
    <div class="mb-12 flex justify-center">
        <div class="relative floating-icon">
            <div class="absolute inset-0 bg-black/5 blur-3xl rounded-full scale-150"></div>
            <div class="relative w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-[0_20px_50px_rgba(0,0,0,0.08)] border border-gray-50">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span class="absolute -top-1 -right-1 flex h-4 w-4">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-black opacity-20"></span>
                    <span class="relative inline-flex rounded-full h-4 w-4 bg-black border-2 border-white"></span>
                </span>
            </div>
        </div>
    </div>

    <h1 class="serif-font text-4xl md:text-5xl text-[#111] tracking-tight mb-6 animate-reveal delay-1">
        Check your email
    </h1>

    <p class="text-gray-500 text-[14px] md:text-[15px] font-light leading-relaxed mb-12 max-w-[380px] mx-auto animate-reveal delay-2">
        A secure link to reset your password has been sent to your inbox. Please follow the instructions to continue.
    </p>

    <div class="space-y-6 animate-reveal delay-3">
        <button onclick="openMail()" class="group relative w-full bg-black text-white py-5 text-[11px] font-bold uppercase tracking-[0.3em] overflow-hidden transition-all hover:bg-[#222] active:scale-[0.98]">
            <span class="relative z-10">Open Inbox</span>
            <div class="absolute inset-0 w-full h-full bg-white/10 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-500"></div>
        </button>

        <div>
            <a href="{% url 'login' %}" class="text-[10px] text-gray-400 uppercase tracking-[0.2em] hover:text-black transition-colors duration-300">
                Wait, I remember my password. <span class="text-black font-bold border-b border-black/20 ml-1">Sign In</span>
            </a>
        </div>
    </div>
</main>

<footer class="absolute bottom-10 w-full text-center animate-reveal delay-3" style="animation-delay: 1s;">
    <p class="text-[9px] text-gray-300 uppercase tracking-[0.4em] mb-4">NØ&Co. Stockholm</p>
    <div class="flex justify-center gap-3">
        <div class="w-1 h-1 bg-black/10 rounded-full"></div>
        <div class="w-1 h-1 bg-black/10 rounded-full"></div>
        <div class="w-1 h-1 bg-black/10 rounded-full"></div>
    </div>
</footer>

<script>
    // Modern logic to attempt opening the mail client
    function openMail() {
        const mailWindow = window.open("https://mail.google.com/", "_blank");
        if (!mailWindow) {
            showToast("Mail client blocked. Please open manually.", "error");
        }
    }

    function showToast(message, type = 'error') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `custom-pill-toast ${type === 'success' ? 'toast-success' : 'toast-error'}`;

        toast.innerHTML = `
            <div class="flex items-center gap-3">
                <div class="toast-icon-circle">${type === 'success' ? '✓' : '✕'}</div>
                <div class="flex flex-col">
                    <span class="toast-main-text">${message}</span>
                </div>
            </div>
        `;

        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }, 4000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const dataElement = document.getElementById('django-messages');
        if (dataElement) {
            try {
                const messages = JSON.parse(dataElement.textContent);
                messages.forEach(msg => {
                    showToast(msg.message, msg.tags.includes('success') ? 'success' : 'error');
                });
            } catch (e) {}
        }
    });
</script>

<script id="django-messages" type="application/json">
    [{% if messages %}{% for message in messages %}{"message": "{{ message|escapejs }}", "tags": "{{ message.tags }}"}{% if not forloop.last %},{% endif %}{% endfor %}{% endif %}]
</script>

</body>
</html>
