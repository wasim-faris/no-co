<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
       .serif-font{font-family:'Playfair Display',serif}
body{font-family:'Inter',sans-serif}
.no-scrollbar::-webkit-scrollbar{display:none}

/* --- DYNAMIC BLACK PILL TOAST (HUGS CONTENT) --- */
#toast-container {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.custom-pill-toast {
    width: max-content; /* Hugs the text */
    max-width: 90vw;
    padding: 10px 22px 10px 14px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: auto;
    background: #000;
    color: #fff;
}

.custom-pill-toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast-left-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.toast-icon-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
}

.toast-success .toast-icon-circle { background: #2F8D46; }
.toast-error .toast-icon-circle { background: #E03B2A; }

.toast-message-wrapper {
    display: flex;
    flex-direction: column;
    white-space: nowrap; /* Prevents text wrapping */
    margin-right: 15px;
}

.toast-main-text {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.2;
}

.toast-sub-text {
    font-size: 9px;
    opacity: 0.7;
    margin-top: 1px;
}

.toast-close-btn {
    cursor: pointer;
    font-size: 16px;
    opacity: 0.6;
    transition: opacity 0.2s;
}
.toast-close-btn:hover { opacity: 1; }

#timer-container{ transition:opacity .5s ease; }
.hidden-resend{ display:none; }
    </style>
</head>

<body class="bg-white flex flex-col min-h-screen">

<div id="toast-container"></div>

<main class="flex-grow flex flex-col items-center justify-center px-4 text-center">

    <div class="mb-8">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-black">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h7a2 2 0 0 1 2 2v1h-18V9a2 2 0 0 1 2-2h7V5.73c-.6-.34-1-1.01-1-1.73a2 2 0 0 1 2-2z"/>
            <path d="M3 10c0 4.42 4.03 8 9 8s9-3.58 9-8"/>
        </svg>
    </div>

    <h1 class="text-[12rem] font-bold leading-none tracking-tighter text-black mb-4">
        404
    </h1>

    <h2 class="text-2xl font-bold text-black mb-2">
        Sorry, the page you're looking for doesn't exist.
    </h2>
    <p class="text-gray-400 text-sm mb-10">
        It may have been moved or deleted.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md justify-center">
        <a href="{% url "home" %}" class="inline-block bg-black text-white px-10 py-4 text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition-colors text-center">
            Back to Home
        </a>
    </div>

</main>

<footer class="py-12 text-center">
    <div class="flex justify-center gap-8 mb-6 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
        <a href="#" class="hover:text-black transition-colors">Help</a>
        <a href="#" class="hover:text-black transition-colors">Contact</a>
        <a href="#" class="hover:text-black transition-colors">Returns</a>
        <a href="#" class="hover:text-black transition-colors">Privacy Policy</a>
    </div>
    <p class="text-[10px] uppercase tracking-widest text-gray-300">
        © 2023 NO&CO. All Rights Reserved.
    </p>
</footer>

<script id="django-messages" type="application/json">
[
{% if messages %}
{% for message in messages %}
{
"message": "{{ message|escapejs }}",
"tags": "{{ message.tags }}"
}{% if not forloop.last %},{% endif %}
{% endfor %}
{% endif %}
]
</script>

<script>
 function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    const toastClass = type === 'success' ? 'toast-success' : 'toast-error';
    toast.className = `custom-pill-toast ${toastClass}`;

    const icon = type === 'success' ? '✓' : '✕';
    const subtext = "Notification";

    toast.innerHTML = `
        <div class="toast-left-content">
            <div class="toast-icon-circle">${icon}</div>
            <div class="toast-message-wrapper">
                <span class="toast-main-text">${message}</span>
                <span class="toast-sub-text">${subtext}</span>
            </div>
        </div>
        <div class="toast-close-btn" onclick="this.parentElement.remove()">✕</div>
    `;

    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        if(toast.parentNode) {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }
    }, 4000);
}

document.addEventListener('DOMContentLoaded', () => {
    const dataElement = document.getElementById('django-messages');
    if (dataElement) {
        try {
            const messages = JSON.parse(dataElement.textContent);
            messages.forEach(msg => {
                showToast(msg.message, msg.tags.includes('error') ? 'error' : 'success');
            });
        } catch (e) {}
    }
});
</script>

</body>
</html>
