{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NØ&Co | Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'accounts/css/forgot-password.css' %}">

<style>
.serif-font{font-family:'Playfair Display',serif}
    body{font-family:'Inter',sans-serif}
    .no-scrollbar::-webkit-scrollbar{display:none}

/* --- DYNAMIC BLACK PILL TOAST (HUGS CONTENT) --- */
#toast-container {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.custom-pill-toast {
    width: max-content; /* Hugs the text */
    max-width: 90vw;
    padding: 10px 22px 10px 14px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: auto;
    background: #000;
    color: #fff;
}

.custom-pill-toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast-left-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.toast-icon-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
}

.toast-success .toast-icon-circle { background: #2F8D46; }
.toast-error .toast-icon-circle { background: #E03B2A; }

.toast-message-wrapper {
    display: flex;
    flex-direction: column;
    white-space: nowrap; /* Prevents text wrapping */
    margin-right: 15px;
}

.toast-main-text {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.2;
}

.toast-sub-text {
    font-size: 9px;
    opacity: 0.7;
    margin-top: 1px;
}

.toast-close-btn {
    cursor: pointer;
    font-size: 16px;
    opacity: 0.6;
    transition: opacity 0.2s;
}
.toast-close-btn:hover { opacity: 1; }

#timer-container{ transition:opacity .5s ease; }
.hidden-resend{ display:none; }
</style>

</head>

<body class="bg-[#fcfcfc] h-screen flex items-center justify-center">

<div id="toast-container"></div>

<div class="bg-white w-full h-screen flex flex-col md:flex-row overflow-hidden">

    <div class="relative hidden md:block md:w-1/2 h-full bg-[#eee]">
        <img src="{% static 'accounts/images/forgot-password.jpg' %}"
             alt="Collection 2026"
             class="w-full h-full object-cover grayscale object-center">

        <div class="absolute bottom-12 left-12 text-white z-10">
            <p class="text-[10px] uppercase tracking-[0.5em] mb-3 font-medium opacity-90">Support</p>
            <h2 class="serif-font text-6xl tracking-tight leading-none">NØ&Co.</h2>
        </div>
    </div>

    <div class="w-full md:w-1/2 h-full flex flex-col bg-white relative">

        <div class="pt-8 px-8 flex justify-start items-center shrink-0 md:hidden">
            <span class="serif-font text-2xl font-semibold tracking-tighter text-black">NØ&Co.</span>
        </div>

        <div class="flex-grow flex items-center justify-center px-8 md:px-20 py-4 overflow-y-auto no-scrollbar">
            <div class="w-full max-w-[400px] text-center md:text-left">
                <header class="mb-10">
                    <h1 class="serif-font text-4xl text-[#111] tracking-tight mb-3">Forgot Password?</h1>
                    <p class="text-gray-400 text-[13px] font-light leading-relaxed">Please enter your email address to receive a password reset link.</p>
                </header>

                <form action="#" method="POST" class="space-y-8">
                    {% csrf_token %}
                    <div class="space-y-6">
                        <div class="group text-left">
                            <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">Email Address</label>
                            <div class="relative">
                                <input type="email" name="email" placeholder="name@example.com"
                                       class="w-full border-b border-gray-200 bg-transparent py-2 pr-8 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                                <div class="absolute right-0 bottom-2 text-gray-300">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-black text-white py-3.5 text-[10px] font-bold uppercase tracking-[0.3em] flex items-center justify-center space-x-2 hover:bg-[#333] active:scale-[0.99] transition-all duration-300">
                        <span>Send Reset Link</span>
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </form>

                <div class="mt-10">
                    <a href="{% url 'login' %}" class="inline-flex items-center text-[10px] text-gray-400 hover:text-black uppercase tracking-[0.2em] transition-colors font-semibold">
                        <svg class="w-3 h-3 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>

        <footer class="pb-8 px-8 md:px-12 flex justify-between items-center text-[8px] text-gray-300 uppercase tracking-[0.2em] shrink-0">
            <p>© 2026 NO&CO</p>
            <div class="flex space-x-6">
                <a href="#" class="hover:text-black transition-colors">Privacy</a>
                <a href="#" class="hover:text-black transition-colors">Cookies</a>
            </div>
        </footer>
    </div>
</div>

<script>
function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    const toastClass = type === 'success' ? 'toast-success' : 'toast-error';
    toast.className = `custom-pill-toast ${toastClass}`;

    const icon = type === 'success' ? '✓' : '✕';
    const subtext = "Notification";

    toast.innerHTML = `
        <div class="toast-left-content">
            <div class="toast-icon-circle">${icon}</div>
            <div class="toast-message-wrapper">
                <span class="toast-main-text">${message}</span>
                <span class="toast-sub-text">${subtext}</span>
            </div>
        </div>
        <div class="toast-close-btn" onclick="this.parentElement.remove()">✕</div>
    `;

    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        if(toast.parentNode) {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }
    }, 4000);
}
</script>

{% if messages %}
<script>
{% for message in messages %}
showToast("{{ message|escapejs }}","{{ message.tags }}");
{% endfor %}
</script>
{% endif %}

</body>
</html>
