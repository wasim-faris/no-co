{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NØ&Co | Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'accounts/css/forgot-password.css' %}">

<style>
/* Floating Toast */

#toast-container {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    pointer-events: none;
}

.toast-pill {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 0, 0, 0.1);
    padding: 14px 28px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
    transform: translateY(-150%);
    opacity: 0;
    transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
}

.toast-pill.show {
    transform: translateY(0);
    opacity: 1;
}

.toast-pill.error {
    border-left: 3px solid #000;
}

.toast-text {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    font-weight: 600;
    color: #000;
}
</style>

</head>

<body class="bg-[#fcfcfc] h-screen flex items-center justify-center">

<!-- Toast -->
<div id="toast-container">
    <div id="toast" class="toast-pill">
        <span id="toast-message" class="toast-text"></span>
    </div>
</div>

<div class="bg-white w-full h-screen flex flex-col md:flex-row overflow-hidden">

    <div class="relative hidden md:block md:w-1/2 h-full bg-[#eee]">
        <img src="{% static 'accounts/images/forgot-password.jpg' %}"
             alt="Collection 2026"
             class="w-full h-full object-cover grayscale object-center">

        <div class="absolute bottom-12 left-12 text-white z-10">
            <p class="text-[10px] uppercase tracking-[0.5em] mb-3 font-medium opacity-90">Support</p>
            <h2 class="serif-font text-6xl tracking-tight leading-none">NØ&Co.</h2>
        </div>
    </div>

    <div class="w-full md:w-1/2 h-full flex flex-col bg-white relative">

        <div class="pt-8 px-8 flex justify-start items-center shrink-0 md:hidden">
            <span class="serif-font text-2xl font-semibold tracking-tighter text-black">NØ&Co.</span>
        </div>

        <div class="flex-grow flex items-center justify-center px-8 md:px-20 py-4 overflow-y-auto no-scrollbar">
            <div class="w-full max-w-[400px] text-center md:text-left">
                <header class="mb-10">
                    <h1 class="serif-font text-4xl text-[#111] tracking-tight mb-3">Forgot Password?</h1>
                    <p class="text-gray-400 text-[13px] font-light leading-relaxed">Please enter your email address to receive a password reset link.</p>
                </header>

                <form action="#" method="POST" class="space-y-8">
                    {% csrf_token %}
                    <div class="space-y-6">
                        <div class="group text-left">
                            <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">Email Address</label>
                            <div class="relative">
                                <input type="email" name="email" placeholder="name@example.com"
                                       class="w-full border-b border-gray-200 bg-transparent py-2 pr-8 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                                <div class="absolute right-0 bottom-2 text-gray-300">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-black text-white py-3.5 text-[10px] font-bold uppercase tracking-[0.3em] flex items-center justify-center space-x-2 hover:bg-[#333] active:scale-[0.99] transition-all duration-300">
                        <span>Send Reset Link</span>
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </form>

                <div class="mt-10">
                    <a href="{% url 'login' %}" class="inline-flex items-center text-[10px] text-gray-400 hover:text-black uppercase tracking-[0.2em] transition-colors font-semibold">
                        <svg class="w-3 h-3 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>

        <footer class="pb-8 px-8 md:px-12 flex justify-between items-center text-[8px] text-gray-300 uppercase tracking-[0.2em] shrink-0">
            <p>© 2026 CLOUZIE WOMEN</p>
            <div class="flex space-x-6">
                <a href="#" class="hover:text-black transition-colors">Privacy</a>
                <a href="#" class="hover:text-black transition-colors">Cookies</a>
            </div>
        </footer>
    </div>
</div>

<script>
function showToast(message, type="success") {

    const toast = document.getElementById("toast");
    const msg = document.getElementById("toast-message");

    msg.innerText = message;

    toast.classList.remove("error");

    if(type === "error"){
        toast.classList.add("error");
    }

    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    },4000);
}
</script>

{% if messages %}
<script>
{% for message in messages %}
showToast("{{ message|escapejs }}","{{ message.tags }}");
{% endfor %}
</script>
{% endif %}

</body>
</html>
