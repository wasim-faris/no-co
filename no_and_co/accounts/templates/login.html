{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>NØ&Co | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
    <style>
        .serif-font { font-family: 'Playfair Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* EXACT TOAST THEME FROM SIGNUP */
        #toast-container {
            z-index: 9999;
            pointer-events: none;
        }

        .toast-pill {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 14px 28px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            transform: translateY(-150%);
            opacity: 0;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .toast-pill.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-pill.error {
            border-left: 3px solid #000;
        }

        .toast-text {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-weight: 600;
            color: #000;
        }

        /* UX Fix: Prevent shiver on interactions */
        .btn-stable {
            backface-visibility: hidden;
            transform: translateZ(0);
        }
    </style>
</head>
<body class="bg-[#fcfcfc] h-screen flex items-center justify-center">

    <div id="toast-container" class="fixed top-8 left-0 right-0 flex flex-col items-center space-y-4 px-4"></div>

    <div class="bg-white w-full h-screen flex flex-col md:flex-row overflow-hidden">

        <div class="relative hidden md:block md:w-1/2 h-full bg-[#eee]">
            <img src="{% static 'accounts/images/login.jpg' %}"
                 alt="Login Collection"
                 class="w-full h-full object-cover grayscale">

            <div class="absolute bottom-12 left-12 text-black">
                <p class="text-[10px] uppercase tracking-[0.5em] mb-3 font-medium opacity-90">Collection 2026</p>
                <h2 class="serif-font text-6xl tracking-tight leading-none">NØ&Co.</h2>
            </div>
        </div>

        <div class="w-full md:w-1/2 h-full flex flex-col bg-white relative">
            <div class="pt-8 px-8 flex justify-start items-center shrink-0 md:hidden">
                <span class="serif-font text-2xl font-semibold tracking-tighter">NØ&Co.</span>
            </div>

            <div class="flex-grow flex items-center justify-center px-8 md:px-20 py-4 overflow-y-auto no-scrollbar">
                <div class="w-full max-w-[400px]">
                    <header class="mb-10">
                        <h1 class="serif-font text-4xl text-[#111] tracking-tight mb-3">Welcome Back</h1>
                        <p class="text-gray-400 text-[13px] font-light leading-relaxed">Sign in to your account for a personalized experience.</p>
                    </header>

                    <form action="#" method="POST" class="space-y-8">
                        {% csrf_token %}
                        <div class="space-y-6">
                            <div class="group">
                                <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">Username or Email</label>
                                <input type="text" name="username" placeholder="sarah@example.com"
                                       class="w-full border-b border-gray-200 bg-transparent py-2 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                            </div>

                            <div class="group relative">
                                <div class="flex justify-between items-center mb-1">
                                    <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 transition-colors group-focus-within:text-black">Password</label>
                                    <a href="{% url "forgot-password" %}" class="text-[9px] text-gray-300 hover:text-black uppercase tracking-widest transition-colors">Forgot?</a>
                                </div>
                                <input type="password" id="password" name="password" placeholder="••••••••"
                                       class="w-full border-b border-gray-200 bg-transparent py-2 pr-8 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                                <button type="button" onclick="togglePassword('password', this)" class="absolute right-0 bottom-2 text-gray-400 hover:text-black transition-colors">
                                    <svg class="eye-closed w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L1 1m22 22L14.12 14.12"></path></svg>
                                    <svg class="eye-open w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path><circle cx="12" cy="12" r="2.5" stroke-width="1.2"></circle></svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-stable w-full bg-black text-white py-3.5 text-[10px] font-bold uppercase tracking-[0.3em] flex items-center justify-center space-x-2 hover:bg-[#333] active:scale-[0.99] transition-all duration-300">
                            <span>Sign In</span>
                        </button>
                         <a href="{% provider_login_url 'google' process='login' %}" class="w-full border border-gray-200 py-3 text-[10px] font-medium uppercase tracking-[0.15em] flex items-center justify-center space-x-3 hover:bg-gray-50 transition-all duration-300">
    <svg width="14" height="14" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    <span class="text-gray-500">Sign in with Google</span>
</a>
                    </form>

                    <p class="text-center mt-8 text-[11px] text-gray-400 uppercase tracking-widest">
                        Not a Member? <a href="{% url 'signup' %}" class="text-black font-bold border-b border-black ml-1 pb-0.5">Join Us</a>
                    </p>
                </div>
            </div>

            <footer class="pb-8 px-8 md:px-12 flex justify-between items-center text-[8px] text-gray-300 uppercase tracking-[0.2em] shrink-0">
                <p>© 2026 NO&CO</p>
                <div class="flex space-x-6">
                    <a href="#" class="hover:text-black transition-colors">Privacy</a>
                    <a href="#" class="hover:text-black transition-colors">Cookies</a>
                </div>
            </footer>
        </div>
    </div>

    <script id="django-messages" type="application/json">
        [
            {% if messages %}
                {% for message in messages %}
                    {
                        "message": "{{ message|escapejs }}",
                        "tags": "{{ message.tags }}"
                    }{% if not forloop.last %},{% endif %}
                {% endfor %}
            {% endif %}
        ]
    </script>

    <script>
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast-pill ${type}`;

            // Icon exactly from your reference image
            const icon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 1.25rem;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

            toast.innerHTML = `
                <span class="text-black">${icon}</span>
                <span class="toast-text">${message}</span>
            `;

            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.add('show'));

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 700);
            }, 4000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const dataElement = document.getElementById('django-messages');
            if (dataElement) {
                try {
                    const messages = JSON.parse(dataElement.textContent);
                    messages.forEach(msg => {
                        showToast(msg.message, msg.tags.includes('error') ? 'error' : 'success');
                    });
                } catch (e) {
                    console.error("Error parsing messages");
                }
            }
        });

        function togglePassword(inputId, el) {
            const input = document.getElementById(inputId);
            const closed = el.querySelector('.eye-closed');
            const open = el.querySelector('.eye-open');
            if (input.type === "password") {
                input.type = "text";
                closed.classList.add('hidden');
                open.classList.remove('hidden');
            } else {
                input.type = "password";
                closed.classList.remove('hidden');
                open.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
