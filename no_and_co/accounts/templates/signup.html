{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NØ&Co | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="{% static 'accounts/css/signup.css' %}">

    <style>
.serif-font{font-family:'Playfair Display',serif}
body{font-family:'Inter',sans-serif}
.no-scrollbar::-webkit-scrollbar{display:none}

/* --- DYNAMIC BLACK PILL TOAST (HUGS CONTENT) --- */
#toast-container {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.custom-pill-toast {
    width: max-content; /* Hugs the text */
    max-width: 90vw;
    padding: 10px 22px 10px 14px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: auto;
    background: #000;
    color: #fff;
}

.custom-pill-toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast-left-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.toast-icon-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
}

.toast-success .toast-icon-circle { background: #2F8D46; }
.toast-error .toast-icon-circle { background: #E03B2A; }

.toast-message-wrapper {
    display: flex;
    flex-direction: column;
    white-space: nowrap; /* Prevents text wrapping */
    margin-right: 15px;
}

.toast-main-text {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.2;
}

.toast-sub-text {
    font-size: 9px;
    opacity: 0.7;
    margin-top: 1px;
}

.toast-close-btn {
    cursor: pointer;
    font-size: 16px;
    opacity: 0.6;
    transition: opacity 0.2s;
}
.toast-close-btn:hover { opacity: 1; }

#timer-container{ transition:opacity .5s ease; }
.hidden-resend{ display:none; }
    </style>
</head>
<body class="bg-[#fcfcfc] h-screen flex items-center justify-center overflow-hidden">

    <div id="toast-container"></div>

    <div class="bg-white w-full h-screen flex flex-col md:flex-row overflow-hidden">
        <div class="relative hidden md:block md:w-1/2 h-full bg-[#eee]">
            <img src="{% static 'accounts/images/signup.jpg' %}" alt="Autumn/Winter" class="w-full h-full object-cover grayscale object-top">
            <div class="absolute bottom-12 left-12 text-white">
                <p class="text-[10px] uppercase tracking-[0.5em] mb-3 font-medium opacity-90">Collection 2026</p>
                <h2 class="serif-font text-6xl tracking-tight leading-none">NØ&Co.</h2>
            </div>
        </div>

        <div class="w-full md:w-1/2 h-full flex flex-col bg-white relative">
            <div class="pt-8 px-8 flex justify-start items-center shrink-0 md:hidden">
                <span class="serif-font text-2xl font-semibold tracking-tighter">NØ&Co.</span>
            </div>

            <div class="flex-grow flex items-center justify-center px-8 md:px-20 py-4 overflow-y-auto no-scrollbar">
                <div class="w-full max-w-[400px]">
                    <header class="mb-10">
                        <h1 class="serif-font text-4xl text-[#111] tracking-tight mb-3">Create Account</h1>
                        <p class="text-gray-400 text-[13px] font-light leading-relaxed">Join for exclusive early access and seasonal updates.</p>
                    </header>

                    <form action="#" method="POST" id="signupForm" class="space-y-6">
                        {% csrf_token %}
                        <div class="space-y-5">
                            <div class="group">
                                <label class="flex items-center text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1">username</label>
                                <input type="text" name="username" placeholder="Sarah" class="w-full border-b border-gray-200 bg-transparent py-2 text-sm focus:outline-none focus:border-black rounded-none">
                            </div>
                            <div class="group">
                                <label class="flex items-center text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1">Email Address</label>
                                <input type="email" name="email" placeholder="sarah@example.com" class="w-full border-b border-gray-200 bg-transparent py-2 text-sm focus:outline-none focus:border-black rounded-none">
                            </div>
                            <div class="grid grid-cols-2 gap-6">
                                <div class="group relative">
                                    <label class="text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1">Password</label>
                                    <input type="password" id="password" name="password" placeholder="••••••••" class="w-full border-b border-gray-200 bg-transparent py-2 text-sm focus:outline-none focus:border-black rounded-none">
                                </div>
                                <div class="group relative">
                                    <label class="text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1">Confirm</label>
                                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" class="w-full border-b border-gray-200 bg-transparent py-2 text-sm focus:outline-none focus:border-black rounded-none">
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-black text-white py-3.5 text-[10px] font-bold uppercase tracking-[0.3em] flex items-center justify-center hover:bg-[#333] transition-all">
                            <span id="btnText">Register</span>
                            <svg id="btnSpinner" class="hidden animate-spin h-3 w-3 ml-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        </button>

                        <a href="{% provider_login_url 'google' process='login' %}" class="w-full border border-gray-200 py-3 text-[10px] font-medium uppercase tracking-[0.15em] flex items-center justify-center space-x-3 hover:bg-gray-50 transition-all duration-300">
                            <svg width="14" height="14" viewBox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            <span class="text-gray-500">Sign in with Google</span>
                        </a>

                        <div class="pt-4 text-center">
                            <p class="text-[11px] text-gray-400 uppercase tracking-widest font-medium">
                                Already have an account?
                                <a href="{% url 'login' %}" class="text-black hover:underline underline-offset-4 ml-1">Sign In</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

<script>
   function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    const toastClass = type === 'success' ? 'toast-success' : 'toast-error';
    toast.className = `custom-pill-toast ${toastClass}`;

    const icon = type === 'success' ? '✓' : '✕';
    const subtext = "Notification";

    toast.innerHTML = `
        <div class="toast-left-content">
            <div class="toast-icon-circle">${icon}</div>
            <div class="toast-message-wrapper">
                <span class="toast-main-text">${message}</span>
                <span class="toast-sub-text">${subtext}</span>
            </div>
        </div>
        <div class="toast-close-btn" onclick="this.parentElement.remove()">✕</div>
    `;

    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        if(toast.parentNode) {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }
    }, 4000);
}

    // Keep your Form submission UI and Django message logic as is,
    // but they will now use the new showToast above.
    document.addEventListener('DOMContentLoaded', () => {
        const dataElement = document.getElementById('django-messages');
        if (dataElement) {
            try {
                const messages = JSON.parse(dataElement.textContent);
                messages.forEach(msg => showToast(msg.message, msg.tags));
            } catch (e) {}
        }
    });

    const signupForm = document.getElementById('signupForm');
    if (signupForm) {
        signupForm.addEventListener('submit', () => {
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            btnText.innerText = "SENDING...";
            btnSpinner.classList.remove('hidden');
        });
    }
</script>

<script id="django-messages" type="application/json">
    [{% if messages %}{% for message in messages %}{"message": "{{ message|escapejs }}", "tags": "{{ message.tags }}"}{% if not forloop.last %},{% endif %}{% endfor %}{% endif %}]
</script>

</body>
</html>
