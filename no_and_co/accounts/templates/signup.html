{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NØ&Co | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .serif-font { font-family: 'Playfair Display', serif; }
        input::placeholder { color: #A1A1AA; font-weight: 300; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Modern Toggle Logic */
        .eye-toggle .eye-open,
        .eye-toggle .eye-closed { display: none; }

        .eye-toggle.hidden-pass .eye-closed { display: block; }
        .eye-toggle.visible-pass .eye-open { display: block; }
    </style>
</head>
<body class="bg-[#fcfcfc] h-screen flex items-center justify-center">

    <div class="bg-white w-full h-screen flex flex-col md:flex-row overflow-hidden">

        <div class="relative hidden md:block md:w-1/2 h-full bg-[#eee]">
            <img src="{% static "accounts/images/signup.jpg" %}"
                 alt="Autumn/Winter Collection"
                 class="w-full h-full object-cover grayscale object-top">

            <div class="absolute bottom-12 left-12 text-white">
                <p class="text-[10px] uppercase tracking-[0.5em] mb-3 font-medium opacity-90">Collection 2026</p>
                <h2 class="serif-font text-6xl tracking-tight leading-none">NØ&Co.</h2>
            </div>
        </div>

        <div class="w-full md:w-1/2 h-full flex flex-col bg-white relative">

            <div class="pt-8 px-8 flex justify-start items-center shrink-0 md:hidden">
                <span class="serif-font text-2xl font-semibold tracking-tighter">NØ&Co.</span>
            </div>

            <div class="flex-grow flex items-center justify-center px-8 md:px-20 py-4 overflow-y-auto no-scrollbar">
                <div class="w-full max-w-[400px]">
                    <header class="mb-10">
                        <h1 class="serif-font text-4xl text-[#111] tracking-tight mb-3">Create Account</h1>
                        <p class="text-gray-400 text-[13px] font-light leading-relaxed">Join for exclusive early access and seasonal updates.</p>
                    </header>

                    <form action="#" method="POST" class="space-y-6">
                        {% csrf_token %}
                        <div class="space-y-5">
                            <div class="group">
                                <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">Full Name</label>
                                <input type="text" name="full_name" placeholder="Sarah Jenkins"
                                       class="w-full border-b border-gray-200 bg-transparent py-2 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                            </div>

                            <div class="group">
                                <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">Email Address</label>
                                <input type="email" name="email" placeholder="sarah@example.com"
                                       class="w-full border-b border-gray-200 bg-transparent py-2 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                            </div>

                            <div class="grid grid-cols-2 gap-6">
                                <div class="group relative">
                                    <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">Password</label>
                                    <input type="password" id="password" name="password" placeholder="••••••••"
                                           class="w-full border-b border-gray-200 bg-transparent py-2 pr-8 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                                    <button type="button" onclick="togglePassword('password', this)" class="eye-toggle hidden-pass absolute right-0 bottom-2 text-gray-400 hover:text-black transition-colors">
                                        <svg class="eye-closed w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L1 1m22 22L14.12 14.12"></path>
                                        </svg>
                                        <svg class="eye-open w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                            <circle cx="12" cy="12" r="2.5" stroke-width="1.2"></circle>
                                        </svg>
                                    </button>
                                </div>
                                <div class="group relative">
                                    <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">Confirm</label>
                                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••"
                                           class="w-full border-b border-gray-200 bg-transparent py-2 pr-8 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                                    <button type="button" onclick="togglePassword('confirm_password', this)" class="eye-toggle hidden-pass absolute right-0 bottom-2 text-gray-400 hover:text-black transition-colors">
                                        <svg class="eye-closed w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L1 1m22 22L14.12 14.12"></path>
                                        </svg>
                                        <svg class="eye-open w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                            <circle cx="12" cy="12" r="2.5" stroke-width="1.2"></circle>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-black text-white py-3.5 text-[10px] font-bold uppercase tracking-[0.3em] flex items-center justify-center space-x-2 hover:bg-[#333] active:scale-[0.99] transition-all duration-300">
                            <span>Register</span>
                        </button>

                        <div class="relative py-2 flex items-center">
                            <div class="flex-grow border-t border-gray-100"></div>
                            <span class="flex-shrink mx-4 text-[9px] text-gray-300 uppercase tracking-[0.3em]">or</span>
                            <div class="flex-grow border-t border-gray-100"></div>
                        </div>

                        <button type="button" class="w-full border border-gray-200 py-3 text-[10px] font-medium uppercase tracking-[0.15em] flex items-center justify-center space-x-3 hover:bg-gray-50 transition-all duration-300">
                            <svg width="14" height="14" viewBox="0 0 24 24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            <span class="text-gray-500">Sign up with Google</span>
                        </button>
                    </form>

                    <p class="text-center mt-8 text-[11px] text-gray-400 uppercase tracking-widest">
                        A Member? <a href="#" class="text-black font-bold border-b border-black ml-1 pb-0.5">Sign In</a>
                    </p>
                </div>
            </div>

            <footer class="pb-8 px-8 md:px-12 flex justify-between items-center text-[8px] text-gray-300 uppercase tracking-[0.2em] shrink-0">
                <p>© 2026 CLOUZIE WOMEN</p>
                <div class="flex space-x-6">
                    <a href="#" class="hover:text-black transition-colors">Privacy</a>
                    <a href="#" class="hover:text-black transition-colors">Cookies</a>
                </div>
            </footer>
        </div>
    </div>

    <script>
        function togglePassword(inputId, el) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                el.classList.remove('hidden-pass');
                el.classList.add('visible-pass');
            } else {
                input.type = "password";
                el.classList.remove('visible-pass');
                el.classList.add('hidden-pass');
            }
        }
    </script>
</body>
</html>
