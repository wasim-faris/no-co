{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NØ&Co | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'accounts/css/reset-password.css' %}">
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>

    <style>
        .serif-font{font-family:'Playfair Display',serif}
        body{font-family:'Inter',sans-serif}
        .no-scrollbar::-webkit-scrollbar{display:none}

        }

        .info-icon {
            margin-left: 6px;

            display: inline-flex;
        }

              .serif-font{font-family:'Playfair Display',serif}
        body{font-family:'Inter',sans-serif}
        .no-scrollbar::-webkit-scrollbar{display:none}

        .tippy-box[data-theme~='nordic'] {
            background-color: #111;
            color: #fff;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 0;
            padding: 2px 6px;
        }

        .info-icon-wrapper {
            display: inline-flex;
            margin-left: 6px;
            color: #9ca3af;
            cursor: help;
            transition: color 0.2s;
        }

        .info-icon-wrapper:hover {
            color: #111;
        }

        .toggle-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            height: 100%;
            display: flex;
            align-items: center;
        }
        .group:focus-within .toggle-btn,
        .toggle-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .serif-font{font-family:'Playfair Display',serif}
body{font-family:'Inter',sans-serif}
.no-scrollbar::-webkit-scrollbar{display:none}

#toast-container {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.custom-pill-toast {
    width: max-content;
    max-width: 90vw;
    padding: 10px 22px 10px 14px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: auto;
    background: #000;
    color: #fff;
}

.custom-pill-toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast-left-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.toast-icon-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
}

.toast-success .toast-icon-circle { background: #2F8D46; }
.toast-error .toast-icon-circle { background: #E03B2A; }

.toast-message-wrapper {
    display: flex;
    flex-direction: column;
    white-space: nowrap;
    margin-right: 15px;
}

.toast-main-text {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.2;
}

.toast-sub-text {
    font-size: 9px;
    opacity: 0.7;
    margin-top: 1px;
}

.toast-close-btn {
    cursor: pointer;
    font-size: 16px;
    opacity: 0.6;
    transition: opacity 0.2s;
}
.toast-close-btn:hover { opacity: 1; }

#timer-container{ transition:opacity .5s ease; }
.hidden-resend{ display:none; }
    </style>
</head>
<body class="bg-[#fcfcfc] min-h-screen flex items-center justify-center">

    <div id="toast-container"></div>

    <div class="bg-white w-full h-screen flex flex-col md:flex-row overflow-hidden">

        <div class="relative hidden md:block md:w-1/2 h-full bg-[#eee]">
            <img src="{% static 'accounts/images/reset-password.jpg' %}"
                 alt="Reset Password"
                 class="w-full h-full object-cover object-center">

            <div class="absolute bottom-12 left-12 text-white z-10">
                <p class="text-[10px] uppercase tracking-[0.5em] mb-3 font-medium opacity-90">Security</p>
                <h2 class="serif-font text-6xl tracking-tight leading-none">NØ&Co.</h2>
            </div>
        </div>

        <div class="w-full md:w-1/2 h-full flex flex-col bg-white relative">

            <div class="pt-8 px-8 flex justify-start items-center shrink-0 md:hidden">
                <span class="serif-font text-2xl font-semibold tracking-tighter text-black">NØ&Co.</span>
            </div>

            <div class="flex-1 flex items-center justify-center px-8 md:px-20 py-10 overflow-y-auto no-scrollbar">
                <div class="w-full max-w-[400px] text-center md:text-left">
                    <header class="mb-10 text-center md:text-left">
                        <h1 class="serif-font text-4xl text-[#111] tracking-tight mb-3">Reset Password</h1>
                        <p class="text-gray-400 text-[13px] font-light leading-relaxed">Create a new, secure password for your account. Make sure it's strong and unique.</p>
                    </header>

                    <form action="#" method="POST" class="space-y-8">
                        {% csrf_token %}
                        <div class="space-y-6 text-left">

                            <div class="group">
                                <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">
                                    New Password
                                    <span class="info-icon" data-tippy-content="8+ chars, uppercase & symbol">
                                        !
                                    </span>
                                </label>
                                <div class="relative">
                                    <input type="password" name="new_password" id="new_password" placeholder="••••••••"
                                           class="w-full border-b border-gray-200 bg-transparent py-2 pr-12 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                                    <button type="button" onclick="toggleVisibility('new_password')" class="absolute right-0 bottom-2 text-[9px] font-bold uppercase tracking-widest text-gray-400 hover:text-black transition-colors">Show</button>
                                </div>
                            </div>

                            <div class="group">
                                <label class="block text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400 mb-1 transition-colors group-focus-within:text-black">
                                    Confirm Password
                                    <span class="info-icon" data-tippy-content="Must match password">
                                        !
                                    </span>
                                </label>
                                <div class="relative">
                                    <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••"
                                           class="w-full border-b border-gray-200 bg-transparent py-2 pr-12 text-sm focus:outline-none focus:border-black transition-all duration-300 rounded-none">
                                    <button type="button" onclick="toggleVisibility('confirm_password')" class="absolute right-0 bottom-2 text-[9px] font-bold uppercase tracking-widest text-gray-400 hover:text-black transition-colors">Show</button>
                                </div>
                            </div>

                        </div>

                          <button type="submit" id="submitBtn" class="w-full bg-black text-white py-3.5 text-[10px] font-bold uppercase tracking-[0.3em] flex items-center justify-center hover:bg-[#333] transition-all">
                            <span id="btnText">save password</span>
                            <svg id="btnSpinner" class="hidden animate-spin h-3 w-3 ml-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        </button>
                    </form>

                    <div class="mt-8 flex items-center justify-center w-full gap-2 text-gray-300 text-[10px] uppercase tracking-tighter mx-auto">
                        <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <span class="text-center">Our platform is safe, reliable and secure</span>
                    </div>
                </div>
            </div>

            <footer class="pb-8 px-8 md:px-12 flex flex-col md:flex-row justify-between items-center text-[8px] text-gray-300 uppercase tracking-[0.2em] shrink-0 space-y-4 md:space-y-0">
                <p>© 2026 CLOUZIE WOMEN</p>
                <div class="flex space-x-6">
                    <a href="#" class="hover:text-black transition-colors">Help</a>
                    <a href="#" class="hover:text-black transition-colors">Privacy</a>
                    <a href="#" class="hover:text-black transition-colors">Terms</a>
                </div>
            </footer>
        </div>
    </div>
  <script id="django-messages" type="application/json">
        [
            {% if messages %}
                {% for message in messages %}
                    {
                        "message": "{{ message|escapejs }}",
                        "tags": "{{ message.tags }}"
                    }{% if not forloop.last %},{% endif %}
                {% endfor %}
            {% endif %}
        ]
    </script>
<script>
   function showToast(message, type = 'error') {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    const toastClass = type === 'success' ? 'toast-success' : 'toast-error';
    toast.className = `custom-pill-toast ${toastClass}`;

    const icon = type === 'success' ? '✓' : '✕';
    const subtext = "Notification";

    toast.innerHTML = `
        <div class="toast-left-content">
            <div class="toast-icon-circle">${icon}</div>
            <div class="toast-message-wrapper">
                <span class="toast-main-text">${message}</span>
                <span class="toast-sub-text">${subtext}</span>
            </div>
        </div>
        <div class="toast-close-btn" onclick="this.parentElement.remove()">✕</div>
    `;

    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        if(toast.parentNode) {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }
    }, 4000);
}

    document.addEventListener('DOMContentLoaded', () => {
        tippy('.info-icon', {
            theme: 'minimal',
            animation: 'shift-away',
            duration: 200,
            arrow: false,
        });

        const dataElement = document.getElementById('django-messages');
        if (dataElement) {
            try {
                const messages = JSON.parse(dataElement.textContent);
                messages.forEach(msg => showToast(msg.message, msg.tags));
            } catch (e) {}
        }
    });

    function toggleVisibility(id) {
        const input = document.getElementById(id);
        const btn = input.nextElementSibling;
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = 'Hide';
        } else {
            input.type = 'password';
            btn.textContent = 'Show';
        }
    }
</script>
</body>
</html>
