<header class="w-full bg-white border-b border-gray-100 sticky top-0 z-50">
  <style>
    /* Modern Dropdown Animation */
    .user-dropdown {
        display: none;
        position: absolute;
        top: 100%;
        right: 0;
        background: white;
        border: 1px solid #f0f0f0;
        width: 180px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        margin-top: 10px;
        z-index: 100;
        animation: fadeInDown 0.2s ease-out;
    }

    .user-dropdown.active {
        display: block;
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .dropdown-item {
        display: block;
        padding: 12px 20px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: #111;
        transition: background 0.3s;
    }

    .dropdown-item:hover {
        background: #f9f9f9;
    }

    .dropdown-divider {
        height: 1px;
        background: #f0f0f0;
        margin: 0;
    }
  </style>

  <div class="w-full px-4 md:px-8 flex items-center justify-between h-16">

    <div class="brand text-2xl font-medium tracking-tighter">NØ&CO</div>

    <nav class="hidden md:flex items-center gap-10">
      <a href="#" class="nav-link text-[0.85rem] text-black border-b-2 border-black pb-1">Mens</a>
      <a href="#" class="nav-link text-[0.85rem] text-gray-400 hover:text-black transition-colors">Ladies</a>
      <a href="#" class="nav-link text-[0.85rem] text-gray-400 hover:text-black transition-colors">Kids</a>
      <a href="#" class="nav-link text-[0.85rem] text-gray-400 hover:text-black transition-colors">Beauty</a>
    </nav>

    <div class="flex items-center gap-5 text-gray-800">
      <svg class="w-5 h-5 cursor-pointer" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>

      <svg class="w-5 h-5 cursor-pointer" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>

      <div class="relative group">
        {% if user.is_authenticated %}
            <svg id="userMenuTrigger" class="w-5 h-5 cursor-pointer hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <div id="userDropdown" class="user-dropdown">
                <div class="px-5 py-3 border-b border-gray-50">
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest">Logged in as</p>
                    <p class="text-[11px] font-bold truncate">{{ user.username }}</p>
                </div>
                <a href="" class="dropdown-item">My Profile</a>
                <a href="#" class="dropdown-item">Settings</a>
                <div class="dropdown-divider"></div>
                <form action="{% url "logout-user" %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="dropdown-item w-full text-left">Logout</button>
                </form>
            </div>
        {% else %}
            <a href="{% url 'login' %}">
                <svg class="w-5 h-5 cursor-pointer hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
            </a>
        {% endif %}
      </div>

      <svg class="w-5 h-5 cursor-pointer" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>

  </div>

  <script>
    // Handle Dropdown Toggle
    const trigger = document.getElementById('userMenuTrigger');
    const dropdown = document.getElementById('userDropdown');

    if (trigger && dropdown) {
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('active');
        });

        // Close when clicking anywhere else
        document.addEventListener('click', (e) => {
            if (!trigger.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });
    }
  </script>
</header>
