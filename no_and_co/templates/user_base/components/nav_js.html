<script>
    /* ── Drawer: event delegation so it survives any DOM update ── */
    function openDrawer() {
        const toggle  = document.getElementById('drawerToggle');
        const drawer  = document.getElementById('mobileDrawer');
        const overlay = document.getElementById('drawerOverlay');
        if (!drawer) return;
        if (toggle)  toggle.classList.add('is-active');
        drawer.classList.add('is-active');
        if (overlay) overlay.classList.add('is-active');
        document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
        const toggle  = document.getElementById('drawerToggle');
        const drawer  = document.getElementById('mobileDrawer');
        const overlay = document.getElementById('drawerOverlay');
        if (!drawer) return;
        if (toggle)  toggle.classList.remove('is-active');
        drawer.classList.remove('is-active');
        if (overlay) overlay.classList.remove('is-active');
        document.body.style.overflow = '';
    }

    /* Single delegated listener — works after any DOM change */
    document.addEventListener('click', function(e) {
        /* Hamburger open button */
        if (e.target.closest('#drawerToggle')) {
            const drawer = document.getElementById('mobileDrawer');
            if (drawer && drawer.classList.contains('is-active')) {
                closeDrawer();
            } else {
                openDrawer();
            }
            return;
        }
        /* Close (X) button inside drawer */
        if (e.target.closest('#drawerClose')) {
            closeDrawer();
            return;
        }
        /* Overlay click */
        if (e.target.id === 'drawerOverlay') {
            closeDrawer();
            return;
        }
    });
</script>
