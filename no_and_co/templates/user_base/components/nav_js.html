<script>
(function() {
    /* Guard: prevent duplicate attachment if script runs more than once */
    if (window.__drawerInitialized) return;
    window.__drawerInitialized = true;

    /* ── Named helper functions ── */
    function openDrawer() {
        var toggle  = document.getElementById('drawerToggle');
        var drawer  = document.getElementById('mobileDrawer');
        var overlay = document.getElementById('drawerOverlay');
        if (!drawer) return;
        if (toggle)  toggle.classList.add('is-active');
        drawer.classList.add('is-active');
        if (overlay) overlay.classList.add('is-active');
        document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
        var toggle  = document.getElementById('drawerToggle');
        var drawer  = document.getElementById('mobileDrawer');
        var overlay = document.getElementById('drawerOverlay');
        if (!drawer) return;
        if (toggle)  toggle.classList.remove('is-active');
        drawer.classList.remove('is-active');
        if (overlay) overlay.classList.remove('is-active');
        document.body.style.overflow = '';
    }

    /* Expose globally so other scripts can call them if needed */
    window.openDrawer  = openDrawer;
    window.closeDrawer = closeDrawer;

    /* ── Single delegated click handler (named, attached once) ── */
    function handleDrawerClick(e) {
        /* Hamburger toggle */
        if (e.target.closest('#drawerToggle')) {
            var drawer = document.getElementById('mobileDrawer');
            if (drawer && drawer.classList.contains('is-active')) {
                closeDrawer();
            } else {
                openDrawer();
            }
            return;
        }
        /* Overlay click to close */
        if (e.target.id === 'drawerOverlay') {
            closeDrawer();
            return;
        }
    }
    document.addEventListener('click', handleDrawerClick);

    /* ── Reset stale state on page load / bfcache restore ── */
    function resetDrawerState() {
        var toggle  = document.getElementById('drawerToggle');
        var drawer  = document.getElementById('mobileDrawer');
        var overlay = document.getElementById('drawerOverlay');
        if (toggle)  toggle.classList.remove('is-active');
        if (drawer)  drawer.classList.remove('is-active');
        if (overlay) overlay.classList.remove('is-active');
        if (!document.querySelector('.uni-modal.active')) {
            document.body.style.overflow = '';
        }
    }
    window.addEventListener('pageshow', resetDrawerState);
    document.addEventListener('DOMContentLoaded', resetDrawerState);
})();
</script>
