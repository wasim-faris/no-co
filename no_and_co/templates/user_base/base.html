<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}NO&CO – Men's Fashion{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    body { font-family: 'Manrope', sans-serif; margin: 0; padding: 0; }
    .brand { font-weight: 800; letter-spacing: -0.02em; }
    .nav-link { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; }
    .section-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; }
    .sub-label { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: #666; }
    .no-gap { gap: 0 !important; }
    .product-grid-item { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background-color: #fff; }
    .product-grid-item img { width: 100%; height: 100%; object-fit: cover; }
    .footer-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #000; margin-bottom: 1rem; }
    .footer-link { font-size: 0.65rem; color: #6b7280; display: block; margin-bottom: 0.65rem; transition: color 0.2s; text-decoration: none; }
    .footer-link:hover { color: #000; }

    /* ════════════════════════════════════════
       SKELETON ANIMATION & SHIMMER
    ════════════════════════════════════════ */
    .skeleton {
        background: #e5e5e5;
        background: linear-gradient(90deg, #e5e5e5 25%, #f2f2f2 50%, #e5e5e5 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite linear;
        border-radius: 2px;
    }
    @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    .skeleton-img {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
    }
    .skeleton-text {
        height: 12px;
        margin-bottom: 8px;
    }
    .skeleton-swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
    }

    /* LAZY LOAD LOGIC & REVEAL */
    .lazy-image {
        opacity: 0;
        transition: opacity 0.4s ease-in-out;
    }
    .skeleton-wrapper .actual-content {
        display: none; 
    }
    .skeleton-wrapper.is-loaded .skeleton {
        display: none !important;
        animation: none;
    }
    .skeleton-wrapper.is-loaded .actual-content {
        display: block;
    }
    .skeleton-wrapper.is-loaded .lazy-image {
        opacity: 1;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-white text-black">

<!-- Announcement Bar -->
<div class="w-full bg-[#f5f5f5] py-4 px-5 flex items-center justify-between border-b border-gray-100">
    <span class="text-[#e03b2a] text-lg font-medium uppercase tracking-wide">
        FLAT 20% OFF ALL MENSWEAR
    </span>
    <span class="text-[#e03b2a] text-xl leading-none font-light">+</span>
</div>

{% include 'user_base/components/navbar.html' %}
  <main class="pb-20 md:pb-0">
    {% block content %}
    {% endblock %}
  </main>

{% include 'user_base/components/footer.html' %}

<!-- Mobile Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 z-[100] md:hidden px-4 pb-4">
    <div class="bg-white/90 backdrop-blur-xl border border-gray-100 shadow-[0_-10px_40px_rgba(0,0,0,0.08)] px-8 py-3 rounded-[30px] flex items-center justify-between">
        <a href="/" class="text-black transition-all hover:scale-110 active:scale-95">
            <i class="ri-home-line text-[22px]"></i>
        </a>
        <a href="#" class="text-black/40 transition-all hover:scale-110 active:scale-95">
            <i class="ri-search-line text-[22px]"></i>
        </a>
        <a href="#" class="text-black/40 transition-all hover:scale-110 active:scale-95">
            <i class="ri-heart-line text-[22px]"></i>
        </a>
        <a href="{% if user.is_authenticated %}{% url 'user-profile' user.id %}{% else %}{% url 'login' %}{% endif %}" class="text-black/40 transition-all hover:scale-110 active:scale-95">
            <i class="ri-user-line text-[22px]"></i>
        </a>
        <a href="#" class="text-black/40 transition-all hover:scale-110 active:scale-95">
            <i class="ri-shopping-bag-line text-[22px]"></i>
        </a>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const lazyImages = document.querySelectorAll('img.lazy-image');
    if ('IntersectionObserver' in window) {
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    if (img.dataset.src) {
                        img.src = img.dataset.src;
                        img.removeAttribute('data-src');
                    }
                    img.onload = () => {
                        const wrapper = img.closest('.skeleton-wrapper');
                        if (wrapper) wrapper.classList.add('is-loaded');
                        else img.classList.add('is-loaded');
                    };
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: "200px 0px", threshold: 0.01 });

        lazyImages.forEach(image => imageObserver.observe(image));
    } else {
        // Fallback for older browsers
        lazyImages.forEach(img => {
            if (img.dataset.src) {
                img.src = img.dataset.src;
                img.removeAttribute('data-src');
            }
            img.onload = () => {
                const wrapper = img.closest('.skeleton-wrapper');
                if (wrapper) wrapper.classList.add('is-loaded');
            };
        });
    }
});
</script>

</body>
</html>
