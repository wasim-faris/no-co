<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel - NØ&CO{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f1eb;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .rounded-custom { border-radius: 24px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="antialiased min-h-screen flex">

    <!-- Reusable Sidebar -->
    {% include 'admin_base/components/sidebar.html' %}

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <main class="flex-1 overflow-y-auto hide-scrollbar">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
