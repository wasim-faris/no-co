{% if page_obj.has_other_pages %}
<div class="flex items-center justify-center gap-2.5 my-8">
    {% for num in page_obj.paginator.page_range %}
        {% if page_obj.number == num %}
            <span class="w-8 h-8 flex items-center justify-center rounded-full bg-black text-white text-[11px] font-bold shadow-md cursor-default">
                {{ num }}
            </span>
        {% else %}
            <a href="?{% for key, value in request.GET.items %}{% if key != 'page' %}{{ key }}={{ value }}&{% endif %}{% endfor %}page={{ num }}"
               class="w-8 h-8 flex items-center justify-center rounded-full bg-transparent border border-gray-200 border-opacity-60 text-gray-500 text-[11px] font-bold hover:bg-gray-50 hover:text-black hover:-translate-y-[1px] hover:shadow-sm transition-all duration-300">
                {{ num }}
            </a>
        {% endif %}
    {% endfor %}
</div>
{% endif %}
