<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - NO & CO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    background-color: #F5F1EB;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
}

.brand-title {
    font-family: 'Playfair Display', serif;
}

.hm-input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #D6D1C8;
    padding: 14px 0;
    font-size: 14px;
    background: transparent;
}

/* 🔥 REMOVE BROWSER EYE ICON */
input::-ms-reveal,
input::-ms-clear {
    display: none;
}

input[type="password"]::-webkit-credentials-auto-fill-button,
input[type="password"]::-webkit-contacts-auto-fill-button {
    visibility: hidden;
    display: none !important;
    pointer-events: none;
}

.hm-input:focus {
    outline: none;
    border-bottom: 1px solid #3E3A37;
}

.hm-label {
    display: block;
    font-[600] text-[10px] uppercase tracking-[0.15em] text-[#8C8377] mb-2;
}

/* SHOW/HIDE TEXT */
.toggle-text {
    position: absolute;
    right: 0;
    bottom: 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #8C8377;
    cursor: pointer;
}
.toggle-text:hover {
    color: #3E3A37;
}

/* spinner */
.spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.icon-bubble {
    position: relative;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.icon-bubble svg { transform: rotate(45deg); }

@media (max-width: 768px) {
    .image-section { display: none; }
}
</style>
</head>

<body class="flex items-center justify-center">

<!-- TOAST -->
<div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3">
{% if messages %}
{% for message in messages %}
<div class="toast-item flex items-center gap-3 px-4 py-3 rounded-full shadow-lg bg-[#3E3A37] text-white transition-all duration-500 transform translate-x-full">
<div class="w-8 h-8 bg-[#F5F1EB] icon-bubble">
<svg class="w-3 h-3 text-[#3E3A37]" fill="none" stroke="currentColor" stroke-width="3">
<path d="M5 13l4 4L19 7"/>
</svg>
</div>
<span class="text-[11px]">{{ message }}</span>
</div>
{% endfor %}
{% endif %}
</div>

<main class="flex w-full h-screen overflow-hidden">

<!-- LEFT -->
<section class="image-section hidden md:block w-1/2 h-full relative">
<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1920&auto=format&fit=crop"
class="w-full h-full object-cover">
<div class="absolute inset-0 bg-[#F5F1EB]/20"></div>
</section>

<!-- RIGHT -->
<section class="w-full md:w-1/2 h-full bg-[#F5F1EB] flex flex-col justify-between items-center py-16 px-10 md:px-24">

<div class="text-center">
<h1 class="brand-title text-4xl text-[#3E3A37]">NØ&CO</h1>
<div class="h-[1px] w-8 bg-[#3E3A37] mx-auto mt-4 opacity-20"></div>
</div>

<div class="w-full max-w-[360px]">

<div class="mb-10 text-center">
<h2 class="text-[11px] font-bold uppercase tracking-[0.3em] text-[#3E3A37]">
RESET PASSWORD
</h2>
<p class="text-[10px] text-[#8C8377] mt-2">
Choose a new secure password
</p>
</div>

<form method="POST" id="resetForm">
{% csrf_token %}

<!-- PASSWORD -->
<div class="mb-8 relative">
<label class="hm-label">New Password</label>
<input id="new_password" name="new_password" type="password" required class="hm-input">
<span class="toggle-text" onclick="togglePassword('new_password', this)">Show</span>
</div>

<!-- CONFIRM -->
<div class="mb-6 relative">
<label class="hm-label">Confirm Password</label>
<input id="confirm_password" name="confirm_password" type="password" required class="hm-input">
<span class="toggle-text" onclick="togglePassword('confirm_password', this)">Show</span>
</div>

{% if passwords_mismatch %}
<div class="text-[10px] text-red-500 text-center mb-6 uppercase tracking-widest">
Passwords Do Not Match
</div>
{% endif %}

<button id="saveBtn" type="submit"
class="w-full bg-[#3E3A37] text-[#F5F1EB] py-4 text-[11px] font-bold uppercase tracking-[0.2em] flex items-center justify-center gap-2 hover:bg-[#2E2A27] transition-all">
<span id="btnText">Save Changes</span>
</button>

</form>

<form method="POST" action="{% url 'admin-cancel-reset-password' %}" class="mt-10">
{% csrf_token %}
<button type="submit"
class="text-[10px] text-[#8C8377] underline hover:text-[#3E3A37] w-full text-center">
← Back to Login
</button>
</form>

</div>

<div class="text-center">
<p class="text-[9px] tracking-[0.3em] text-[#8C8377] uppercase">
© 2026 NØ&CO
</p>
</div>

</section>
</main>

<script>
// SHOW / HIDE TEXT
function togglePassword(id, el) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        el.innerText = "Hide";
    } else {
        input.type = "password";
        el.innerText = "Show";
    }
}

// BUTTON UX
document.getElementById('resetForm').addEventListener('submit', function() {
    const btn = document.getElementById('saveBtn');
    const text = document.getElementById('btnText');

    btn.disabled = true;
    text.innerHTML = "Saving...";

    const spinner = document.createElement("div");
    spinner.classList.add("spinner");

    btn.appendChild(spinner);
});

// TOAST
document.addEventListener('DOMContentLoaded', function() {
const toasts = document.querySelectorAll('.toast-item');

toasts.forEach((toast, index) => {
setTimeout(() => {
toast.classList.remove('translate-x-full');
}, 100 * (index + 1));

setTimeout(() => {
toast.classList.add('opacity-0');
setTimeout(() => toast.remove(), 500);
}, 5000);
});
});
</script>

</body>
</html>
