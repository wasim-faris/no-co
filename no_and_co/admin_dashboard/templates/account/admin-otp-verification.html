<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Identity - NO & CO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    background-color: #F5F1EB;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

.brand-title {
    font-family: 'Playfair Display', serif;
}

/* OTP */
.otp-input {
    width: 52px;
    height: 60px;
    border-radius: 12px;
    border: 1px solid #E0DBD2;
    background: #FAF7F2;
    text-align: center;
    font-size: 20px;
    font-weight: 500;
    color: #3E3A37;
    transition: all 0.2s ease;
}

.otp-input:focus {
    outline: none;
    border-color: #3E3A37;
    background: #FFFFFF;
    box-shadow: 0 0 0 3px rgba(62,58,55,0.08);
    transform: translateY(-2px);
}

/* 🔥 spinner */
.spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.icon-bubble {
    position: relative;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.icon-bubble svg { transform: rotate(45deg); }

@media (max-width: 768px) {
    .image-section { display: none; }
}
</style>
</head>

<body class="flex items-center justify-center">

<!-- TOAST -->
<div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3">
{% if messages %}
{% for message in messages %}
<div class="toast-item flex items-center gap-3 px-4 py-3 rounded-full shadow-lg bg-[#3E3A37] text-white transition-all duration-500 transform translate-x-full">
<div class="w-8 h-8 bg-[#F5F1EB] icon-bubble">
<svg class="w-3 h-3 text-[#3E3A37]" fill="none" stroke="currentColor" stroke-width="3">
<path d="M5 13l4 4L19 7"/>
</svg>
</div>
<span class="text-[11px]">{{ message }}</span>
</div>
{% endfor %}
{% endif %}
</div>

<form id="resendForm" method="POST" action="{% url 'admin-resend-otp' %}">
{% csrf_token %}
</form>

<main class="flex w-full h-screen overflow-hidden">

<section class="image-section hidden md:block w-1/2 h-full relative">
<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1920&auto=format&fit=crop"
class="w-full h-full object-cover">
<div class="absolute inset-0 bg-[#F5F1EB]/20"></div>
</section>

<section class="w-full md:w-1/2 h-full bg-[#F5F1EB] flex flex-col justify-between items-center py-16 px-10 md:px-24">

<div class="text-center">
<h1 class="brand-title text-4xl text-[#3E3A37]">NØ&CO</h1>
<div class="h-[1px] w-8 bg-[#3E3A37] mx-auto mt-4 opacity-20"></div>
</div>

<div class="w-full max-w-[360px] text-center">

<div class="mb-10">
<h2 class="text-[11px] font-bold uppercase tracking-[0.3em] text-[#3E3A37]">
VERIFY IDENTITY
</h2>
<p class="text-[10px] text-[#8C8377] mt-2">
Enter the OTP sent to your email
</p>
</div>

<form method="POST" id="otpForm">
{% csrf_token %}
<input type="hidden" name="otp_code" id="otp_code_hidden">

<div class="flex justify-center gap-3 mb-8">
<input type="text" maxlength="1" class="otp-field otp-input">
<input type="text" maxlength="1" class="otp-field otp-input">
<input type="text" maxlength="1" class="otp-field otp-input">
<input type="text" maxlength="1" class="otp-field otp-input">
<input type="text" maxlength="1" class="otp-field otp-input">
<input type="text" maxlength="1" class="otp-field otp-input">
</div>

<div class="mb-10 text-center">
<div id="timer-display" class="text-[11px] font-medium text-[#8C8377] uppercase tracking-widest mb-2">
00:<span id="seconds">00</span> Remaining
</div>

<button
type="button"
id="resend-btn"
onclick="document.getElementById('resendForm').submit();"
class="hidden text-[#3E3A37] text-[11px] underline hover:opacity-70">
Resend Code
</button>
</div>

<button id="verifyBtn" type="submit"
class="w-full bg-[#3E3A37] text-[#F5F1EB] py-4 text-[11px] font-bold uppercase tracking-[0.2em] flex items-center justify-center gap-2 hover:bg-[#2E2A27] transition-all">
<span id="verifyText">Verify & Access</span>
</button>

</form>

<div class="mt-10">
<form action="{% url 'admin-cancel-reset-password' %}" method="POST">
{% csrf_token %}
<button type="submit"
class="text-[10px] text-[#8C8377] underline hover:text-[#3E3A37]">
← Back to Login
</button>
</form>
</div>

</div>

<div class="text-center">
<p class="text-[9px] tracking-[0.3em] text-[#8C8377] uppercase">
© 2026 NØ&CO
</p>
</div>

</section>
</main>

<script>
// 🔥 VERIFY BUTTON ANIMATION
document.getElementById('otpForm').addEventListener('submit', function() {
    const btn = document.getElementById('verifyBtn');
    const text = document.getElementById('verifyText');

    btn.disabled = true;
    text.innerHTML = "Verifying...";

    const spinner = document.createElement("div");
    spinner.classList.add("spinner");

    btn.appendChild(spinner);
});

// TIMER (UNCHANGED)
let timeLeft = Math.floor(parseFloat("{{ remaining_time|default:0 }}"));
const secondsSpan = document.getElementById('seconds');
const timerDisplay = document.getElementById('timer-display');
const resendBtn = document.getElementById('resend-btn');

function updateTimer() {
if (timeLeft <= 0) {
timerDisplay.classList.add('hidden');
resendBtn.classList.remove('hidden');
} else {
secondsSpan.textContent = timeLeft < 10 ? '0' + timeLeft : timeLeft;
timeLeft--;
setTimeout(updateTimer, 1000);
}
}
updateTimer();

// OTP LOGIC (UNCHANGED)
const otpFields = document.querySelectorAll('.otp-field');
const hiddenInput = document.getElementById('otp_code_hidden');

function updateHiddenInput() {
let code = "";
otpFields.forEach(i => code += i.value);
hiddenInput.value = code;
}

otpFields.forEach((input, index) => {
if (index === 0) input.focus();

input.addEventListener('input', (e) => {
e.target.value = e.target.value.replace(/[^0-9]/g, '');
updateHiddenInput();

if (e.target.value && index < otpFields.length - 1)
otpFields[index + 1].focus();
});

input.addEventListener('keydown', (e) => {
if (e.key === "Backspace" && !input.value && index > 0)
otpFields[index - 1].focus();
});
});

// TOAST (UNCHANGED)
document.addEventListener('DOMContentLoaded', function() {
const toasts = document.querySelectorAll('.toast-item');

toasts.forEach((toast, index) => {
setTimeout(() => {
toast.classList.remove('translate-x-full');
}, 100 * (index + 1));

setTimeout(() => {
toast.classList.add('opacity-0');
setTimeout(() => toast.remove(), 500);
}, 4000);
});
});
</script>

</body>
</html>
