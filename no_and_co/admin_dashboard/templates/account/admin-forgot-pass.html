<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - NO & CO</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    width: 100%;
    height: 100%;
    background-color: #F5F1EB;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
}

.brand-title {
    font-family: 'Playfair Display', serif;
    letter-spacing: -0.02em;
}

.hm-input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #D6D1C8;
    padding: 12px 0;
    font-size: 13px;
    background: transparent;
}

.hm-input:focus {
    outline: none;
    border-bottom: 1px solid #8C8377;
}

.hm-label {
    display: block;
    font-[600] text-[10px] uppercase tracking-[0.15em] text-[#8C8377] mb-1;
}

.icon-bubble {
    position: relative;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.icon-bubble svg { transform: rotate(45deg); }

/* 🔥 SPINNER */
.spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@media (max-width: 768px) {
    .image-section { display: none; }
}
</style>
</head>

<body class="flex items-center justify-center">

<!-- TOAST -->
<div id="toast-container" class="fixed top-8 right-8 z-50 flex flex-col gap-4">
{% if messages %}
{% for message in messages %}
<div class="toast-item flex items-center justify-between min-w-[320px] p-3 rounded-full shadow-xl transition-all duration-500 transform translate-x-full
{% if message.tags == 'error' %}bg-[#3E3A37]{% else %}bg-[#5C554F]{% endif %} text-white">
<div class="flex items-center gap-4">
<div class="ml-1 w-10 h-10 bg-[#F5F1EB] icon-bubble">
<svg class="w-4 h-4 text-[#3E3A37]" fill="none" stroke="currentColor" stroke-width="3">
<path d="M5 13l4 4L19 7"/>
</svg>
</div>
<div class="flex flex-col text-left">
<span class="text-[11px] font-bold uppercase">Notice</span>
<span class="text-[10px] opacity-70">{{ message }}</span>
</div>
</div>
<button onclick="this.parentElement.remove()" class="mr-2 w-7 h-7 flex items-center justify-center rounded-full bg-white/10">✕</button>
</div>
{% endfor %}
{% endif %}
</div>

<main class="flex w-full h-screen overflow-hidden">

<!-- LEFT -->
<section class="image-section hidden md:block w-1/2 h-full relative">
<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1920&auto=format&fit=crop"
class="w-full h-full object-cover">
<div class="absolute inset-0 bg-[#F5F1EB]/20"></div>
</section>

<!-- RIGHT -->
<section class="w-full md:w-1/2 h-full bg-[#F5F1EB] flex flex-col justify-between items-center py-16 px-10 md:px-24">

<div class="text-center">
<h1 class="brand-title text-4xl text-[#3E3A37]">NØ&CO</h1>
<div class="h-[1px] w-8 bg-[#3E3A37] mx-auto mt-4 opacity-20"></div>
</div>

<div class="w-full max-w-[360px]">

<div class="mb-10 text-center">
<h2 class="text-[11px] font-bold uppercase tracking-[0.3em] text-[#3E3A37]">Forgot Password</h2>
<p class="text-[10px] text-[#8C8377] mt-2">
Enter your email to receive OTP
</p>
</div>

<form method="POST" id="otpForm">
{% csrf_token %}

<div class="mb-8">
<label class="hm-label">Email Address</label>
<input type="email" name="email" required class="hm-input" placeholder="admin@noandco.com">
</div>

<button id="submitBtn" type="submit"
class="w-full bg-[#3E3A37] text-[#F5F1EB] py-4 text-[11px] font-bold uppercase tracking-[0.2em] flex items-center justify-center gap-2 hover:bg-[#2E2A27] transition-all">
<span id="btnText">Send OTP</span>
</button>
</form>

<div class="mt-10 text-center">
<form action="{% url 'admin-cancel-reset-password' %}" method="POST">
{% csrf_token %}
<button type="submit" class="text-[10px] font-medium text-[#8C8377] underline hover:text-[#3E3A37]">
← Back to Login
</button>
</form>
</div>

</div>

<div class="text-center">
<p class="text-[9px] tracking-[0.3em] text-[#8C8377] uppercase">
© 2026 NØ&CO
</p>
</div>

</section>
</main>

<script>
// 🔥 REAL SENDING ANIMATION
document.getElementById('otpForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    const text = document.getElementById('btnText');

    btn.disabled = true;

    text.innerHTML = "Sending OTP...";

    const spinner = document.createElement("div");
    spinner.classList.add("spinner");

    btn.appendChild(spinner);
});

// TOAST
document.addEventListener('DOMContentLoaded', function() {
const toasts = document.querySelectorAll('.toast-item');

toasts.forEach((toast, index) => {
setTimeout(() => {
toast.classList.remove('translate-x-full');
}, 100 * (index + 1));

setTimeout(() => {
toast.classList.add('opacity-0');
setTimeout(() => toast.remove(), 500);
}, 5000);
});
});

window.history.pushState(null, "", window.location.href);
window.onpopstate = function () {
window.location.replace("/admin-forgot-password/");
};

window.addEventListener("pageshow", function (event) {
if (event.persisted) {
window.location.reload();
}
});
</script>

</body>
</html>
