<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            line-height: 1.1;
        }

        .bg-beige {
            background-color: #F5F2ED;
        }

        .full-cover {
            width: 100vw;
            height: 100vh;
            /* Fallback for browsers that don't support dvh */
            height: 100dvh;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px white inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
    <title>NO&CO Admin Portal</title>
</head>
<body>

    <div class="bg-beige full-cover flex flex-col items-center justify-between py-10 px-6 relative">

        <!-- Top: Brand Title -->
        <div class="text-center mt-2">
            <h1 class="brand-title text-3xl md:text-4xl lg:text-5xl text-black uppercase tracking-tight">
                NO&CO ADMIN<br>PORTAL
            </h1>
            <p class="text-[9px] md:text-[10px] tracking-[0.3em] text-gray-400 mt-3 uppercase font-medium">
                Secure access for authorized personnel only.
            </p>
        </div>

        <!-- Middle: Login Form -->
        <div class="bg-white w-full max-w-md md:max-w-lg p-8 md:p-12 shadow-[0_10px_40px_rgba(0,0,0,0.03)] rounded-sm">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-6">
                    <label class="block text-[9px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Username</label>
                    <input type="email" name="email" placeholder="SARAH" required
                        class="w-full border-b border-gray-100 py-3 text-sm focus:outline-none focus:border-black transition-all bg-transparent">
                </div>

                <div class="mb-4 relative">
                    <label class="block text-[9px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2">Password</label>
                    <input type="password" name="password" id="passwordInput" placeholder="••••••••" required
                        class="w-full border-b border-gray-100 py-3 text-sm focus:outline-none focus:border-black transition-all bg-transparent">
                    <button type="button" onclick="togglePassword()" class="absolute right-0 bottom-3 text-[9px] font-bold uppercase tracking-widest text-gray-400 hover:text-black">
                        Show
                    </button>
                </div>

                <div class="text-right mb-8">
                    <a href="{% url "admin-forgot-password" %}" class="text-[9px] font-bold text-red-600 uppercase tracking-widest hover:opacity-70 transition-opacity">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="w-full bg-[#111] text-white py-4 text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-black transition-all active:scale-[0.99]">
                    Sign In To Dashboard
                </button>
            </form>
        </div>

        <!-- Bottom: Footer -->
        <div class="mb-2">
            <p class="text-[8px] md:text-[9px] tracking-[0.5em] text-gray-400 uppercase">
                © 2026 NO&CO. All Rights Reserved.
            </p>
        </div>

    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const btn = event.target;
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerText = 'Hide';
            } else {
                input.type = 'password';
                btn.innerText = 'Show';
            }
        }
    </script>
</body>
</html>
